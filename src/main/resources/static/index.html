<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别检测 Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(165deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: #fff;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header p {
            color: #888;
            font-size: 12px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: flex-start;
            max-width: 1100px;
            width: 100%;
            flex: 1;
            min-height: 0;
        }

        /* 视频区域 */
        .video-section {
            flex: 1;
            min-width: 400px;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .video-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px;
            box-shadow:
                0 20px 40px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255,255,255,0.05) inset;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .video-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1e3f 0%, #0f0f1f 100%);
            aspect-ratio: 4/3;
            flex: 1;
            min-height: 0;
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5), rgba(118, 75, 162, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: 10;
            pointer-events: none;
        }

        .video-wrapper video,
        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video {
            transform: scaleX(-1);
        }

        #canvas {
            transform: scaleX(-1);
            pointer-events: none;
        }

        .camera-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            z-index: 20;
        }

        .camera-badge .dot {
            width: 8px;
            height: 8px;
            background: #ff4757;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .camera-badge.active .dot {
            background: #2ed573;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 信息面板 */
        .info-section {
            width: 280px;
            flex-shrink: 0;
            /* 跟随视口高度，面板内部可滚动 */
            max-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        .info-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            box-shadow:
                0 20px 40px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255,255,255,0.05) inset;
            /* 超出高度时内部滚动，注册区始终可见 */
            overflow-y: auto;
            flex: 1;
        }
        /* 细化滚动条样式 */
        .info-card::-webkit-scrollbar { width: 4px; }
        .info-card::-webkit-scrollbar-track { background: transparent; }
        .info-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* 连接状态 */
        .status-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: #2ed573;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.6);
        }

        .status-label {
            font-size: 14px;
            color: #aaa;
        }

        .status-value {
            font-size: 13px;
            color: #888;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .stat-card.highlight {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            border-color: rgba(102, 126, 234, 0.3);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
        }

        .stat-card.highlight .stat-value {
            font-size: 22px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-start {
            background: linear-gradient(135deg, #2ed573 0%, #26ab5f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4);
        }

        .btn-stop {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-stop:hover:not(:disabled) {
            background: rgba(255,71,87,0.2);
            border-color: rgba(255,71,87,0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* 错误提示 */
        .error-box {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.15), rgba(255, 71, 87, 0.05));
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 10px;
            font-size: 12px;
            color: #ff6b6b;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-box.show {
            display: flex;
        }

        .error-box svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* 使用提示 */
        .tips-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tips-card h4 {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tips-card h4 svg {
            width: 14px;
            height: 14px;
        }

        .tips-list {
            list-style: none;
        }

        .tips-list li {
            font-size: 11px;
            color: #666;
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }

        .tips-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #667eea;
        }

        /* FPS 显示 */
        .fps-display {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            z-index: 20;
        }

        /* 识别结果覆盖层（视频底部） */
        .recognition-overlay {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            z-index: 20;
            display: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
            transition: border-color 0.3s, color 0.3s;
        }
        .recognition-overlay.matched {
            border-color: rgba(46,213,115,0.55);
            color: #2ed573;
        }
        .recognition-overlay.unmatched {
            border-color: rgba(255,71,87,0.45);
            color: #ff6b6b;
        }

        /* 注册面板 */
        .register-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 12px;
        }
        .register-card input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 8px;
            outline: none;
            box-sizing: border-box;
        }
        .register-card input[type="text"]:focus {
            border-color: rgba(102,126,234,0.6);
        }
        .register-card input[type="text"]::placeholder { color: #555; }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .btn-register:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }
        .register-msg {
            font-size: 11px;
            margin-top: 6px;
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .register-msg.ok  { background: rgba(46,213,115,0.15); color: #2ed573; display: block; }
        .register-msg.err { background: rgba(255,71,87,0.15);  color: #ff6b6b; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>人脸识别检测</h1>
        <p>基于 MTCNN 模型 | 实时人脸检测与关键点标注</p>
    </div>

    <div class="main-container">
        <!-- 视频区域 -->
        <div class="video-section">
            <div class="video-card">
                <div class="video-wrapper">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="canvas"></canvas>
                    <div class="camera-badge" id="cameraBadge">
                        <span class="dot"></span>
                        <span>摄像头未启动</span>
                    </div>
                    <div class="fps-display" id="fpsDisplay" style="display: none;">
                        FPS: <span id="fpsValue">0</span>
                    </div>
                    <!-- 识别结果悬浮标签 -->
                    <div class="recognition-overlay" id="recognitionOverlay"></div>
                </div>
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-section">
            <div class="info-card">
                <div class="section-title">连接状态</div>

                <div class="status-card">
                    <div class="status-row">
                        <div class="status-info">
                            <div class="status-dot" id="statusDot"></div>
                            <span class="status-label" id="statusLabel">等待启动</span>
                        </div>
                        <span class="status-value" id="statusValue">--</span>
                    </div>
                </div>

                <div class="section-title">检测统计</div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="faceCount">0</div>
                        <div class="stat-label">当前人脸</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalFaces">0</div>
                        <div class="stat-label">累计检测</div>
                    </div>
                    <div class="stat-card highlight">
                        <div class="stat-value" id="avgTime">0ms</div>
                        <div class="stat-label">平均响应时间</div>
                    </div>
                </div>

                <div class="error-box" id="errorBox">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span id="errorText"></span>
                </div>

                <div class="button-group">
                    <button class="btn btn-start" id="startBtn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        启动检测
                    </button>
                    <button class="btn btn-stop" id="stopBtn" disabled>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
                        </svg>
                        停止
                    </button>
                </div>

                <div class="tips-card">
                    <h4>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        使用说明
                    </h4>
                    <ul class="tips-list">
                        <li>点击"启动检测"开启摄像头</li>
                        <li>允许浏览器访问摄像头权限</li>
                        <li>绿色框标记检测到的人脸</li>
                        <li>五色点标注人脸关键点</li>
                    </ul>
                    <div style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;">
                        <span style="display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b;"></span>左眼
                        </span>
                        <span style="display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: #4ecdc4;"></span>右眼
                        </span>
                        <span style="display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: #ffe66d;"></span>鼻子
                        </span>
                        <span style="display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: #95e1d3;"></span>左嘴角
                        </span>
                        <span style="display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: #a8e6cf;"></span>右嘴角
                        </span>
                    </div>
                </div>

                <!-- 人脸注册面板 -->
                <div class="section-title" style="margin-top:14px;">人脸注册</div>
                <div class="register-card">
                    <input type="text" id="registerName" placeholder="请输入姓名" maxlength="30"/>
                    <div class="button-group" style="margin-bottom:0;">
                        <button class="btn btn-register" id="registerBtn" disabled>
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px;height:14px;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            拍照注册
                        </button>
                    </div>
                    <div class="register-msg" id="registerMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const statusValue = document.getElementById('statusValue');
        const cameraBadge = document.getElementById('cameraBadge');
        const faceCountEl = document.getElementById('faceCount');
        const totalFacesEl = document.getElementById('totalFaces');
        const avgTimeEl = document.getElementById('avgTime');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const fpsValue = document.getElementById('fpsValue');
        // 识别 & 注册 DOM
        const recognitionOverlay = document.getElementById('recognitionOverlay');
        const registerBtn = document.getElementById('registerBtn');
        const registerName = document.getElementById('registerName');
        const registerMsg = document.getElementById('registerMsg');

        // 状态变量
        let ws = null;
        let stream = null;
        let isRunning = false;
        let frameCount = 0;
        let totalTime = 0;
        let totalFacesDetected = 0;
        let captureInterval = null;
        let recognizeInterval = null;   // 定时识别
        let lastFpsUpdate = 0;
        let fpsFrameCount = 0;

        // 配置
        const PROCESS_WIDTH = 640;
        const PROCESS_HEIGHT = 480;
        const WS_URL = `ws://${window.location.host}/ws/face`;
        const CAPTURE_INTERVAL = 300;

        // 初始化
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        registerBtn.addEventListener('click', registerFace);

        function showError(message) {
            errorText.textContent = message;
            errorBox.classList.add('show');
        }

        function hideError() {
            errorBox.classList.remove('show');
        }

        function updateStatus(connected, message) {
            if (connected) {
                statusDot.classList.add('connected');
                statusLabel.textContent = '已连接';
                statusValue.textContent = message || '正常运行';
            } else {
                statusDot.classList.remove('connected');
                statusLabel.textContent = message || '连接断开';
                statusValue.textContent = '--';
            }
        }

        async function startCamera() {
            hideError();

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: PROCESS_WIDTH },
                        height: { ideal: PROCESS_HEIGHT },
                        facingMode: 'user'
                    }
                });

                video.srcObject = stream;

                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                canvas.width = video.videoWidth || PROCESS_WIDTH;
                canvas.height = video.videoHeight || PROCESS_HEIGHT;

                // 更新UI
                startBtn.disabled = true;
                stopBtn.disabled = false;
                registerBtn.disabled = false;
                cameraBadge.classList.add('active');
                cameraBadge.querySelector('span:last-child').textContent = '摄像头运行中';
                fpsDisplay.style.display = 'block';

                connectWebSocket();
                startCapture();

                // 每 2 秒自动识别一次
                recognizeInterval = setInterval(recognizeFace, 2000);

            } catch (err) {
                console.error('启动摄像头失败:', err);
                showError('无法访问摄像头: ' + err.message);
            }
        }

        function stopCamera() {
            isRunning = false;

            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            if (recognizeInterval) {
                clearInterval(recognizeInterval);
                recognizeInterval = null;
            }

            if (ws) {
                ws.close();
                ws = null;
            }

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            recognitionOverlay.style.display = 'none';
            recognitionOverlay.className = 'recognition-overlay';

            frameCount = 0;
            totalTime = 0;
            totalFacesDetected = 0;
            faceCountEl.textContent = '0';
            totalFacesEl.textContent = '0';
            avgTimeEl.textContent = '0ms';

            updateStatus(false, '已停止');
            cameraBadge.classList.remove('active');
            cameraBadge.querySelector('span:last-child').textContent = '摄像头未启动';
            fpsDisplay.style.display = 'none';
            registerBtn.disabled = true;

            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('WebSocket 连接已建立');
                isRunning = true;
                updateStatus(true, '服务正常');
            };

            ws.onmessage = (event) => {
                try {
                    const result = JSON.parse(event.data);
                    handleDetectionResult(result);
                } catch (err) {
                    console.error('解析检测结果失败:', err);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket 连接已关闭');
                updateStatus(false, '连接关闭');
                if (isRunning) {
                    setTimeout(() => {
                        if (isRunning) {
                            connectWebSocket();
                        }
                    }, 1500);
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误:', err);
                showError('服务器连接失败');
            };
        }

        function startCapture() {
            captureInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA && ws && ws.readyState === WebSocket.OPEN) {
                    captureFrame();
                }
            }, CAPTURE_INTERVAL);
        }

        function captureFrame() {
            const startTime = performance.now();

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth || PROCESS_WIDTH;
            tempCanvas.height = video.videoHeight || PROCESS_HEIGHT;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.save();
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(video, -tempCanvas.width, 0);
            tempCtx.restore();

            const imageData = tempCanvas.toDataURL('image/jpeg', 0.5);
            ws.send(JSON.stringify({ image: imageData }));

            const processTime = performance.now() - startTime;
            frameCount++;
            totalTime += processTime;

            // 更新 FPS
            fpsFrameCount++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsValue.textContent = fpsFrameCount;
                fpsFrameCount = 0;
                lastFpsUpdate = now;
            }

            // 更新统计
            totalFacesEl.textContent = totalFacesDetected;
            const avgTime = frameCount > 0 ? Math.round(totalTime / frameCount) : 0;
            avgTimeEl.textContent = avgTime + 'ms';
        }

        function handleDetectionResult(result) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const faceCount = result.faceCount || 0;
            faceCountEl.textContent = faceCount;
            totalFacesDetected += faceCount;

            if (result.faces && Array.isArray(result.faces)) {
                result.faces.forEach(face => {
                    drawFaceBox(face);
                });
            }
        }

        // ── 工具：抓取当前帧 base64 ──────────────────────────────
        function captureCurrentFrame(quality = 0.7) {
            if (!video.videoWidth) return null;
            const tmp = document.createElement('canvas');
            tmp.width  = video.videoWidth;
            tmp.height = video.videoHeight;
            const tCtx = tmp.getContext('2d');
            // 镜像翻转（与检测帧一致）
            tCtx.save();
            tCtx.scale(-1, 1);
            tCtx.drawImage(video, -tmp.width, 0);
            tCtx.restore();
            return tmp.toDataURL('image/jpeg', quality);
        }

        // ── 注册人脸 ─────────────────────────────────────────
        async function registerFace() {
            const name = registerName.value.trim();
            if (!name) {
                showRegisterMsg('请先填写姓名', 'err');
                return;
            }
            const image = captureCurrentFrame(0.8);
            if (!image) {
                showRegisterMsg('摄像头未就绪', 'err');
                return;
            }

            registerBtn.disabled = true;
            showRegisterMsg('注册中…', '');

            try {
                const res = await fetch('/api/face/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, image })
                });
                const data = await res.json();
                if (data.success) {
                    showRegisterMsg(data.message, 'ok');
                    registerName.value = '';
                } else {
                    showRegisterMsg(data.message || '注册失败', 'err');
                }
            } catch (e) {
                showRegisterMsg('请求失败: ' + e.message, 'err');
            } finally {
                registerBtn.disabled = false;
            }
        }

        function showRegisterMsg(text, type) {
            registerMsg.textContent = text;
            registerMsg.className = 'register-msg' + (type ? ' ' + type : '');
            if (!type) registerMsg.style.display = 'block';
        }

        // ── 定时识别 ─────────────────────────────────────────
        let recognizing = false;   // 防止并发

        async function recognizeFace() {
            if (recognizing || !isRunning) return;
            const image = captureCurrentFrame(0.6);
            if (!image) return;

            recognizing = true;
            try {
                const res = await fetch('/api/face/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image })
                });
                const data = await res.json();
                updateRecognitionOverlay(data);
            } catch (e) {
                // 网络失败时静默，不打扰检测流程
                console.debug('识别请求失败:', e.message);
            } finally {
                recognizing = false;
            }
        }

        function updateRecognitionOverlay(data) {
            if (!data.success) return;
            recognitionOverlay.style.display = 'block';
            if (data.matched) {
                const pct = (data.similarity * 100).toFixed(1);
                recognitionOverlay.textContent = `✓ ${data.name}  ${pct}%`;
                recognitionOverlay.className = 'recognition-overlay matched';
            } else {
                recognitionOverlay.textContent = data.message || '未识别';
                recognitionOverlay.className = 'recognition-overlay unmatched';
            }
        }

        // ── 绘制人脸框 ───────────────────────────────────────
        function drawFaceBox(face) {
            const { confidence, landmarks, x, y, width, height } = face;

            const boxColor = confidence >= 0.8 ? '#2ed573' :
                            confidence >= 0.6 ? '#ffa502' : '#ff4757';

            const canvasW = canvas.width;

            let boxX, boxY, boxW, boxH;
            if (landmarks && landmarks.length === 5) {
                let minX = Infinity, maxX = -Infinity;
                let minY = Infinity, maxY = -Infinity;

                landmarks.forEach(p => {
                    minX = Math.min(minX, p.x);
                    maxX = Math.max(maxX, p.x);
                    minY = Math.min(minY, p.y);
                    maxY = Math.max(maxY, p.y);
                });

                const keypointWidth = maxX - minX;
                const keypointHeight = maxY - minY;
                const expandScale = 1.5;
                boxW = keypointWidth * expandScale;
                boxH = keypointHeight * expandScale;

                const noseX = landmarks[2].x;
                const noseY = landmarks[2].y;
                boxX = noseX - boxW / 2;
                boxY = noseY - boxH * 0.35;
            } else {
                boxX = x;
                boxY = y;
                boxW = width;
                boxH = height;
            }

            ctx.save();
            const drawX = canvasW - boxX - boxW;

            ctx.strokeStyle = boxColor;
            ctx.lineWidth = 3;
            ctx.strokeRect(drawX, boxY, boxW, boxH);

            // 绘制关键点 - 不同颜色区分不同位置
            if (landmarks && landmarks.length === 5) {
                // 关键点颜色定义: 左眼、右眼、鼻子、左嘴角、右嘴角
                const pointColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#a8e6cf'];

                landmarks.forEach((point, index) => {
                    const pointDrawX = canvasW - point.x;
                    ctx.beginPath();
                    ctx.arc(pointDrawX, point.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = pointColors[index];
                    ctx.fill();
                });
            }

            const text = `${(confidence * 100).toFixed(0)}%`;
            ctx.save();
            ctx.scale(-1, 1);
            ctx.fillStyle = boxColor;
            ctx.font = 'bold 14px Inter, Arial';
            ctx.fillText(text, -drawX - boxW + 8, boxY - 6);
            ctx.restore();

            ctx.restore();
        }
    </script>
